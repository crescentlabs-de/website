<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#050508"/>

  <!-- Crescent moon (same mask technique as navbar) -->
  <defs>
    <mask id="moonMask">
      <circle cx="13" cy="16" r="10.5" fill="white"/>
      <circle cx="19.5" cy="16" r="8" fill="black"/>
    </mask>
  </defs>
  <circle cx="13" cy="16" r="10.5" fill="white" mask="url(#moonMask)"/>

  <!-- Stars -->
  <circle cx="24" cy="8.5"  r="1.1" fill="white" opacity="0.85"/>
  <circle cx="27.5" cy="15" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="25"   cy="23" r="1"   fill="white" opacity="0.75"/>
  <circle cx="21"   cy="5.5" r="0.6" fill="white" opacity="0.55"/>
  <circle cx="28"   cy="20" r="0.5" fill="white" opacity="0.45"/>
</svg>
